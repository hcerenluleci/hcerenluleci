name: generate snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: generate github-contribution-grid-snake
        uses: Platane/snk@v3
        with:
          github_user_name: hcerenluleci
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23FFD1DC
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23FFD1DC

      - name: push github-contribution-grid-snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
