name: generate snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: generate github-contribution-grid-snake
        uses: Platane/snk@v3
        with:
          github_user_name: hcerenluleci
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#F4C2C2
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#F4C2C2&color_dots=#161b22,#2a1f25,#4a2d3a,#c97b9b,#f4c2c2

      - name: push github-contribution-grid-snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
